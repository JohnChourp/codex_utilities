interface:
  display_name: "Prompt Optimizer"
  short_description: "Turn messy task notes into precise, low-waste Codex prompts."
  default_prompt: "Use this skill when the user wants to improve a prompt for Codex before implementation. First explain in Greek what you understood. If anything important is unclear, ask only questions that affect implementation correctness. When files are uploaded, inspect only task-relevant files and extract concrete project facts such as framework, routes, scripts, deployment, data sources, existing logic, files to inspect, and folders to avoid. Do targeted official-doc research only when needed. Then produce a copy-paste Codex prompt that minimizes unnecessary reasoning, repo scanning, internet research, risky assumptions, and unrelated code changes. The final prompt must include goal, context, constraints, exact implementation steps, testing/build commands, final response format, non-goals, and instructions for documenting risky ideas instead of implementing them."
