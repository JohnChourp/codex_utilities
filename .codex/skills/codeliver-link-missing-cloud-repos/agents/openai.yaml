interface:
  display_name: "Codeliver Link Repos"
  short_description: "Link missing Codeliver cloud repos for GitHub codeliver-* and sync local repos"
  default_prompt: "Use $codeliver-link-missing-cloud-repos to discover GitHub repos containing 'codeliver-' (exclude archived), ensure they are linked as cloud repos in codeliver project 'codeliver' (auto-create in cloud-repos-auto-linking/auto-linked-codeliver-repos when missing), then sync local repos with default CONCURRENCY=20 unless overridden via env. Keep codeliver-sap and codeliver-panel and codeliver-pos and codeliver-app and codeliver-website and codeliver-integration-partners and codeliver-io and codeliver-partners-panel and codeliver-cost-wizard-react in ~/Downloads/projects and all other repos in ~/Downloads/lambdas/codeliver_all."
